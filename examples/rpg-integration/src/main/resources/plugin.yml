name: AeternumGenesisRpgIntegration
version: ${project.version}
main: net.sakurain.mc.aeternumgenesis.examples.rpg.RpgIntegrationPlugin
api-version: '1.21.6'
depend: [AeternumGenesis]
author: Sakurain
commands:
  rpgitem:
    description: Give a runtime-registered RPG item.
    usage: /rpgitem <player> <template>
    permission: genesisrpg.item
  rpgmob:
    description: Spawn a runtime-registered RPG mob.
    usage: /rpgmob <template>
    permission: genesisrpg.mob
  rpgskill:
    description: Trigger a runtime-registered RPG skill.
    usage: /rpgskill <skill>
    permission: genesisrpg.skill
permissions:
  genesisrpg.item:
    default: op
  genesisrpg.mob:
    default: op
  genesisrpg.skill:
    default: op
