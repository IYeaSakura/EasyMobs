name: AeternumGenesis
version: '${project.version}'
main: net.sakurain.mc.aeternumgenesis.AeternumGenesisPlugin
api-version: '1.21.1'
description: Lightweight custom mob/item plugin inspired by MythicMobs
author: Yuyang.Wang
website: https://github.com/IYeaSakura/AeternumGenesis

commands:
  genesis:
    description: AeternumGenesis main command
    usage: /genesis <subcommand>
    aliases: [gs]
    permission: genesis.use

permissions:
  genesis.use:
    description: Basic usage
    default: true
  genesis.admin:
    description: Admin access
    default: op
    children:
      genesis.give: true
      genesis.spawn: true
      genesis.reload: true
      genesis.list: true
  genesis.give:
    description: Give custom items
    default: op
  genesis.spawn:
    description: Spawn custom mobs
    default: op
  genesis.reload:
    description: Reload configuration
    default: op
  genesis.list:
    description: List templates
    default: true
