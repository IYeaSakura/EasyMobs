# AeternumGenesis Example Ecosystem
# Place files in plugins/AeternumGenesis/ecosystems/ (supports subdirectories)

corrupted_forest:
  biomes:
    - "dark_forest"
    - "old_growth_pine_taiga"

  # Optional region filters (currently biome-based matching is used)
  regions:
    - type: "worldguard"
      region: "corrupted_forest"

  environment:
    required_light_level: "< 7"
    required_time: "night"
    required_weather: "any"

  spawn_rules:
    blood_zombie:
      weight: 40
      group_size: "2-5"
      max_per_chunk: 8
      conditions:
        time: "night"
        light_level: "< 7"
    blood_skeleton:
      weight: 30
      group_size: "1-3"
      max_per_chunk: 5

  ambient_particles:
    - type: "ASH"
      density: "medium"
      height: "ground+2"
      interval: 40

  ambient_sounds:
    - id: "AMBIENT_CAVE"
      volume: 0.3
      interval: 200
      chance: 0.3
