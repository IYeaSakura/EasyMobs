  custom_model_data: 3001
  glow: true
  enchantments:
    PROTECTION: 4
    RESPIRATION: 3
    AQUA_AFFINITY: 1
    DURABILITY: 3
    MENDING: 1
  attributes:
    - type: ARMOR
      amount: 4.0
      operation: ADD_NUMBER
      slot: HEAD
    - type: ARMOR_TOUGHNESS
      amount: 4.0
      operation: ADD_NUMBER
      slot: HEAD
    - type: MAX_HEALTH
      amount: 4.0
      operation: ADD_NUMBER
      slot: HEAD
  passive_effects:
    - trigger: WEAR
      effects:
        - type: potion
          potion_type: GLOWING
          duration: -1
